<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | منصة عبدالمعز</title>
  <meta name="description" content="دخول الطلاب إلى منصة الامتحانات والملخصات">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="auth-page">
  <section id="blockedScreen" class="blocked-screen hidden">
    <div class="blocked-card">
      <img class="blocked-logo" src="/logo-moez.png" alt="شعار المنصة">
      <h1>أنت محظور يا حلو</h1>
      <p id="blockedMessage">امشي شوف قرايتك براك ;)</p>
    </div>
  </section>

  <main class="auth-shell" id="authShell">
    <section class="auth-hero-card">
      <a class="admin-link" href="/admin.html">لوحة المالك</a>
      <img class="hero-logo" src="/logo-moez.png" alt="شعار عبدالمعز">
      <h1>منصة الامتحانات</h1>
      <p class="auth-subtitle">دخول الطالب</p>

      <div class="auth-tabs" role="tablist" aria-label="حساب الطالب">
        <button class="auth-tab is-active" id="loginTabBtn" data-tab-target="login" type="button">دخول</button>
        <button class="auth-tab" id="registerTabBtn" data-tab-target="register" type="button">تسجيل</button>
      </div>

      <div id="authStatus" class="status-box auth-status">جاهز</div>

      <form id="loginForm" class="auth-form" novalidate>
        <label class="field">
          <span>الإيميل</span>
          <input id="loginEmail" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required>
        </label>

        <label class="field">
          <span>الباس ورد</span>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" required>
        </label>

        <button class="btn primary wide" id="loginSubmitBtn" type="submit">دخول</button>
      </form>

      <form id="registerForm" class="auth-form hidden" novalidate>
        <label class="field">
          <span>الاسم</span>
          <input id="registerName" type="text" autocomplete="name" placeholder="اسم الطالب" required>
        </label>

        <label class="field">
          <span>الإيميل</span>
          <input id="registerEmail" type="email" inputmode="email" autocomplete="email" placeholder="name@example.com" required>
        </label>

        <label class="field">
          <span>الباس ورد</span>
          <input id="registerPassword" type="password" autocomplete="new-password" placeholder="6 أحرف أو أكثر" required>
        </label>

        <button class="btn primary wide" id="registerSubmitBtn" type="submit">إنشاء حساب</button>
      </form>
    </section>
  </main>

  <footer class="student-footer auth-footer">
    <span>المطور عبدالمعز</span>
    <a href="https://instagram.com/mvii3.a" target="_blank" rel="noreferrer">@mvii3.a</a>
  </footer>

  <script src="/platform-client.js" defer></script>
  <script src="/auth.js" defer></script>
</body>
</html>
