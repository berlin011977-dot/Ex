<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment</title>

<!-- Google Fonts Link -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f2ee;
  --dark:#1a1714;
  --accent:#c8a96e;
  --red:#c0392b;
  --blue:#1a6fa8;
}

body{
  margin:0;
  font-family:'DM Sans';
  background:var(--bg);
}

/* Header */
header{
  background:var(--dark);
  color:#fff;
  text-align:center;
  padding:40px;
}

header h1{
  font-family:'Playfair Display';
}

.subtitle{
  color:var(--accent);
  letter-spacing:2px;
}

/* Table */
.table-box{
  width:80%;
  margin:40px auto;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:var(--dark);
  color:#fff;
  padding:15px;
}

td{
  padding:15px;
  border-top:1px solid #ddd;
}

tr:nth-child(even){
  background:#f0ede8;
}

/* Shapes */
.shapes{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:40px;
}

.shape{
  width:120px;
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  transition:.3s;
}

.shape:hover{
  transform:scale(1.1);
}

.circle{
  border-radius:50%;
  background:var(--red);
}

.square{
  border-radius:15px;
  background:var(--blue);
}

/* Footer */
footer{
  background:var(--dark);
  color:#aaa;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>My Assignment</h1>
  <p class="subtitle">HTML & CSS</p>
</header>

<div class="table-box">
  <table>
    <tr>
      <th>Category</th>
      <th>Details</th>
    </tr>
    <tr>
      <td>Project</td>
      <td>Simple Web Page</td>
    </tr>
    <tr>
      <td>Author</td>
      <td>Abdulmoez Mohammed</td>
    </tr>
  </table>
</div>

<div class="shapes">
  <div class="shape circle">Circle</div>
  <div class="shape square">Square</div>
</div>

<footer>
  <p>Created by <strong>Abdulmoez Mohammed</strong> - 2025</p>
</footer>

</body>
</html>
